<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <!-- Tchesco OS - Logo Horizontal Completo -->
  
  <defs>
    <linearGradient id="blueGradientH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077DD;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glowH">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fundo transparente -->
  <rect width="1200" height="400" fill="none"/>
  
  <!-- === SÍMBOLO À ESQUERDA === -->
  <g transform="translate(0, 0)">
    <!-- Trilhas de circuito -->
    <g stroke="#0099FF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 60 120 L 110 120 L 125 105 L 160 105"/>
      <path d="M 240 105 L 275 105 L 290 120 L 340 120"/>
      <path d="M 60 280 L 110 280 L 125 295 L 170 295"/>
      <path d="M 230 295 L 275 295 L 290 280 L 340 280"/>
      <path d="M 200 340 L 200 320"/>
    </g>
    
    <!-- Nós conectores -->
    <g fill="none" stroke="#0099FF" stroke-width="4">
      <circle cx="52" cy="120" r="7"/>
      <circle cx="52" cy="120" r="2" fill="#0099FF"/>
      <circle cx="348" cy="120" r="7"/>
      <circle cx="348" cy="120" r="2" fill="#0099FF"/>
      <circle cx="52" cy="280" r="7"/>
      <circle cx="52" cy="280" r="2" fill="#0099FF"/>
      <circle cx="348" cy="280" r="7"/>
      <circle cx="348" cy="280" r="2" fill="#0099FF"/>
      <circle cx="200" cy="350" r="7"/>
      <circle cx="200" cy="350" r="2" fill="#0099FF"/>
    </g>
    
    <!-- Letra T -->
    <g fill="url(#blueGradientH)" filter="url(#glowH)">
      <path d="M 120 135 
               L 280 135 
               L 280 175 
               L 225 175
               L 225 315
               L 175 315
               L 175 175
               L 120 175 Z"/>
    </g>
    
    <!-- Chips decorativos -->
    <g fill="#0099FF">
      <rect x="120" y="135" width="12" height="12"/>
      <rect x="268" y="135" width="12" height="12"/>
      <rect x="120" y="163" width="12" height="12"/>
      <rect x="268" y="163" width="12" height="12"/>
    </g>
  </g>
  
  <!-- === TEXTO À DIREITA === -->
  <g transform="translate(420, 0)">
    <!-- "Tchesco" -->
    <text x="0" y="220" 
          font-family="'Orbitron', 'Rajdhani', sans-serif" 
          font-weight="700" 
          font-size="90" 
          fill="#0099FF"
          letter-spacing="2">Tchesco</text>
    
    <!-- "OS" em destaque -->
    <text x="0" y="310" 
          font-family="'Orbitron', 'Rajdhani', sans-serif" 
          font-weight="900" 
          font-size="90" 
          fill="url(#blueGradientH)"
          letter-spacing="8">OS</text>
    
    <!-- Linha de circuito debaixo de "OS" -->
    <g stroke="#0099FF" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M 140 330 L 200 330 L 215 345 L 280 345"/>
      <circle cx="285" cy="345" r="5" fill="none" stroke="#0099FF" stroke-width="3"/>
      <circle cx="285" cy="345" r="1.5" fill="#0099FF"/>
    </g>
    
    <!-- Tagline opcional -->
    <text x="0" y="365" 
          font-family="'Rajdhani', 'Segoe UI', sans-serif" 
          font-weight="400" 
          font-size="18" 
          fill="#0099FF"
          letter-spacing="6"
          opacity="0.7">OPEN · FREE · BRAZILIAN</text>
  </g>
  
</svg>
